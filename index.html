<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Date Checker · DX Game Sync</title>
  </head>
  <body style="margin:0">
    <script>
      // apply the saved theme before first paint to avoid a flash
      try {
        if (localStorage.getItem("rdc_theme") === "light") {
          document.documentElement.classList.add("rdc-light");
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
